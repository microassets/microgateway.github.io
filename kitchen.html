<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Dashboard | FrostLoop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<style>
    :root {
        --bg-light: #F8FAFC;
        --white: #FFFFFF;
        --text-main: #334155;
        --text-muted: #64748B;
        --accent: #14B8A6;
        --pending: #F59E0B;
        --preparing: #6366F1;
        --ready: #10B981;
        --pink: #EC4899;
        --border: #E2E8F0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-main); }

    .dashboard-container { display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
        width: 80px;
        background: var(--white);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 0;
        position: sticky;
        top: 0;
        height: 100vh;
    }
    .sidebar .logo { font-size: 1.4rem; color: var(--accent); }
    .sidebar nav { margin-top: 40px; display: flex; flex-direction: column; gap: 28px; }
    .sidebar nav a { color: var(--text-muted); font-size: 1.2rem; transition: 0.2s; text-decoration: none; }
    .sidebar nav a.active, .sidebar nav a:hover { color: var(--accent); }

    /* ── Main ── */
    .main-content { flex: 1; padding: 30px; overflow-x: hidden; }

    .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .header-titles h1 { font-size: 1.5rem; font-weight: 700; }
    .header-titles p  { color: var(--text-muted); font-size: 0.88rem; margin-top: 3px; }

    .search-box {
        background: var(--white);
        padding: 10px 16px;
        border-radius: 10px;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .search-box input { border: none; outline: none; width: 200px; font-family: 'Inter', sans-serif; font-size: 0.9rem; }

    /* ── Stats Row ── */
    .stats-row {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 14px;
        margin-bottom: 24px;
    }
    .stat-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        text-align: center;
    }
    .stat-card .stat-num { font-size: 2rem; font-weight: 700; }
    .stat-card .stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-card.all      .stat-num { color: var(--text-main); }
    .stat-card.pending  .stat-num { color: var(--pending); }
    .stat-card.preparing .stat-num { color: var(--preparing); }
    .stat-card.ready    .stat-num { color: var(--ready); }

    /* ── Filter Bar ── */
    .filter-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 14px;
    }
    .status-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab {
        padding: 9px 18px;
        border: 1px solid var(--border);
        background: var(--white);
        border-radius: 10px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
    }
    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active { border-color: var(--accent); color: var(--accent); background: #f0fdfa; font-weight: 600; }

    /* ── Orders Grid ── */
    .orders-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 18px;
    }

    /* ── Order Card ── */
    .order-card {
        background: var(--white);
        border-radius: 16px;
        padding: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        display: flex;
        flex-direction: column;
        gap: 14px;
        animation: cardIn 0.35s ease;
        transition: box-shadow 0.2s;
    }
    .order-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.08); }

    @keyframes cardIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* left stripe by status */
    .order-card.pending   { border-left: 4px solid var(--pending); }
    .order-card.preparing { border-left: 4px solid var(--preparing); }
    .order-card.ready     { border-left: 4px solid var(--ready); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .order-id { font-weight: 700; font-size: 1rem; }
    .order-time { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .badge.dine-in  { background: #fce7f3; color: var(--pink); }
    .badge.takeaway { background: #ccfbf1; color: var(--accent); }

    .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.72rem;
        font-weight: 600;
    }
    .status-badge.pending   { background: #fffbeb; color: var(--pending); border: 1px solid #fde68a; }
    .status-badge.preparing { background: #eef2ff; color: var(--preparing); border: 1px solid #c7d2fe; }
    .status-badge.ready     { background: #ecfdf5; color: var(--ready); border: 1px solid #a7f3d0; }

    .card-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .items-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .items-list li {
        display: flex;
        justify-content: space-between;
        font-size: 0.88rem;
        color: var(--text-muted);
        padding: 6px 10px;
        background: var(--bg-light);
        border-radius: 8px;
    }
    .items-list li span { font-weight: 600; color: var(--text-main); }

    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
    .total-price { font-weight: 700; font-size: 1rem; color: var(--text-main); }

    .update-btn {
        padding: 9px 18px;
        border: none;
        border-radius: 10px;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 0.83rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .update-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .update-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .update-btn.to-preparing { background: linear-gradient(135deg, #6366f1, #818cf8); color: white; }
    .update-btn.to-ready     { background: linear-gradient(135deg, #10b981, #34d399); color: white; }
    .update-btn.done         { background: #f1f5f9; color: var(--text-muted); cursor: default; }

    /* ── Empty State ── */
    .empty-state {
        grid-column: 1/-1;
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
    }
    .empty-state i { font-size: 3rem; margin-bottom: 14px; color: #cbd5e1; }
    .empty-state p { font-size: 1rem; }

    /* ── Live Dot ── */
    .live-dot {
        display: inline-block;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--ready);
        margin-right: 6px;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.5; transform: scale(1.3); }
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
        .sidebar { display: none; }
        .main-content { padding: 16px; }
        .search-box input { width: 140px; }
    }

    /* ── New Order Alert ── */
    #alert-backdrop {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.6);
        display: none;
        z-index: 9000;
        align-items: center;
        justify-content: center;
    }
    #alert-backdrop.open { display: flex; }

    #alert-box {
        background: var(--white);
        border-radius: 24px;
        padding: 36px 32px 28px;
        width: 92%;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 24px 60px rgba(0,0,0,0.2);
        animation: alertPop 0.4s cubic-bezier(.22,.68,0,1.3);
        position: relative;
        overflow: hidden;
    }

    #alert-box::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 5px;
        background: linear-gradient(90deg, var(--pending), var(--pink));
        animation: shimmer 1s ease-in-out infinite alternate;
    }

    @keyframes shimmer { from { opacity: 0.5; } to { opacity: 1; } }

    @keyframes alertPop {
        from { transform: scale(0.75); opacity: 0; }
        to   { transform: scale(1);    opacity: 1; }
    }

    .alert-bell {
        font-size: 3.2rem;
        display: block;
        margin-bottom: 10px;
        animation: bellRing 0.5s ease-in-out infinite alternate;
    }
    @keyframes bellRing {
        from { transform: rotate(-18deg); }
        to   { transform: rotate(18deg); }
    }

    #alert-box h2 {
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--pending);
        margin-bottom: 4px;
    }

    #alert-meta {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-weight: 500;
        margin-bottom: 16px;
    }

    #alert-items {
        background: var(--bg-light);
        border-radius: 12px;
        padding: 12px 16px;
        text-align: left;
        max-height: 160px;
        overflow-y: auto;
        font-size: 0.88rem;
        line-height: 1.9;
        margin-bottom: 22px;
        color: var(--text-muted);
    }
    #alert-items strong { color: var(--text-main); }

    .alert-actions { display: flex; gap: 12px; }

    #alert-confirm {
        flex: 1;
        padding: 13px;
        background: linear-gradient(135deg, var(--pending), var(--pink));
        color: white;
        border: none;
        border-radius: 12px;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: opacity 0.2s;
    }
    #alert-confirm:hover { opacity: 0.88; }
    #alert-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

    #alert-dismiss {
        flex: 1;
        padding: 13px;
        background: var(--bg-light);
        color: var(--text-muted);
        border: 1px solid var(--border);
        border-radius: 12px;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: background 0.2s;
    }
    #alert-dismiss:hover { background: #e2e8f0; }
</style>
<body>
<div class="dashboard-container">

    <aside class="sidebar">
        <div class="logo"><i class="fas fa-ice-cream"></i></div>
        <nav>
            <a href="#" class="active"><i class="fas fa-th-large"></i></a>
            <a href="#"><i class="fas fa-concierge-bell"></i></a>
            <a href="#"><i class="fas fa-clipboard-list"></i></a>
            <a href="#"><i class="fas fa-chart-line"></i></a>
            <a href="#"><i class="fas fa-cog"></i></a>
        </nav>
    </aside>

    <main class="main-content">

        <header class="top-header">
            <div class="header-titles">
                <h1>Kitchen Dashboard</h1>
                <p><span class="live-dot"></span>Live order monitoring · FrostLoop</p>
            </div>
            <div class="search-box">
                <i class="fas fa-search" style="color:var(--text-muted)"></i>
                <input type="text" id="searchInput" placeholder="Search by table or item…">
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card all">
                <div class="stat-num" id="count-all">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card pending">
                <div class="stat-num" id="count-pending">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card preparing">
                <div class="stat-num" id="count-preparing">0</div>
                <div class="stat-label">Preparing</div>
            </div>
            <div class="stat-card ready">
                <div class="stat-num" id="count-ready">0</div>
                <div class="stat-label">Ready</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <section class="filter-bar">
            <div class="status-tabs">
                <button class="tab active" data-filter="all">All Orders</button>
                <button class="tab" data-filter="Pending">Pending</button>
                <button class="tab" data-filter="Preparing">Preparing</button>
                <button class="tab" data-filter="Ready">Ready</button>
            </div>
        </section>

        <!-- Cards Grid -->
        <div class="orders-grid" id="ordersGrid">
            <div class="empty-state">
                <i class="fas fa-satellite-dish"></i>
                <p>Connecting to Firebase…</p>
            </div>
        </div>

    </main>
</div>

<!-- ── New Order Alert ── -->
<div id="alert-backdrop">
    <div id="alert-box">
        <span class="alert-bell"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-bell-fill" viewBox="0 0 16 16">
  <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2m.995-14.901a1 1 0 1 0-1.99 0A5 5 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901"/>
</svg></span>
        <h2>New Order!</h2>
        <div id="alert-meta"></div> 
        <div id="alert-items"></div>
        <div class="alert-actions">
            <button id="alert-confirm" onclick="handleConfirm()"> Confirm button>
            <button id="alert-dismiss" onclick="handleDismiss()">✕ Dismiss</button>
        </div>
    </div>
</div>

<script type="module">
    let alertQueue = [];
let isAlertOpen = false;
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, doc, onSnapshot, updateDoc, query, orderBy, where }
                              from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkrE_JqqwxfRdNE5tina5-1-hXqjVh5WE",
        authDomain: "mykitchen-7c86a.firebaseapp.com",
        projectId: "mykitchen-7c86a",
        storageBucket: "mykitchen-7c86a.firebasestorage.app",
        messagingSenderId: "829540664076",
        appId: "1:829540664076:web:425b5b7713a14108ce7f29"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ── State ──
    let allOrders    = [];
    let activeFilter = 'all';
    let searchTerm   = '';

    // ── Buzz Audio ──
    let audioCtx  = null;
    let buzzing   = false;

    function startBuzz() {
        if (buzzing) return;
        buzzing  = true;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function beep() {
            if (!buzzing || !audioCtx) return;
            const osc  = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
            if (buzzing) setTimeout(beep, 850);
        }
        beep();
    }

    function stopBuzz() {
        buzzing = false;
        if (audioCtx) { audioCtx.close(); audioCtx = null; }
    }

    // ── Alert State ──
    let alertDocId = null;

   function showAlert(id, data) {
    isAlertOpen = true;
    alertDocId = id;

    const table = data['Table no'] ?? '—';
    const type  = data.orderType  ?? '—';
    const total = data.totalAmount ?? 0;

    document.getElementById('alert-meta').textContent =
        `Table ${table} · ${type} · Rs. ${total}`;

    document.getElementById('alert-items').innerHTML =
        (data.items || []).map(i =>
            `<div>🍦 <strong>${i.name}</strong> × ${i.qty}
             <span style="float:right;color:var(--pending);font-weight:600">Rs.${i.price * i.qty}</span></div>`
        ).join('') || '<em>No items</em>';

    document.getElementById('alert-backdrop').classList.add('open');
    startBuzz();
}
function showNextAlert() {
    if (alertQueue.length === 0) {
        isAlertOpen = false;
        return;
    }

    const next = alertQueue.shift();
    showAlert(next.id, next.data);
}

  window.handleConfirm = async function() {
    if (!alertDocId) return;

    try {
        // सीधे Ready कर दो (skip Preparing step)
        await updateDoc(doc(db, "Orders", alertDocId), { status: "Preparing" });

        stopBuzz();
        document.getElementById('alert-backdrop').classList.remove('open');
        alertDocId = null;

        showNextAlert();

    } catch(e) {
        console.error(e);
    }
};
  window.handleDismiss = function() {
    stopBuzz();
    document.getElementById('alert-backdrop').classList.remove('open');
    alertDocId = null;

    // 👉 SHOW NEXT ORDER
    showNextAlert();
};

    // ── New-order watcher (Pending only, skip existing on load) ──
    const seenIds   = new Set();
    let   initDone  = false;
    const pendingQ  = query(collection(db, "Orders"), where("status", "==", "Pending"));

    onSnapshot(pendingQ, (snap) => {
        if (!initDone) {
            snap.docs.forEach(d => seenIds.add(d.id));
            initDone = true;
            return;
        }
       snap.docChanges().forEach(change => {
    if (change.type === "added" && !seenIds.has(change.doc.id)) {
        seenIds.add(change.doc.id);

        const orderData = {
            id: change.doc.id,
            data: change.doc.data()
        };

        if (isAlertOpen) {
            alertQueue.push(orderData); // wait in queue
        } else {
            showAlert(orderData.id, orderData.data); // show immediately
        }
    }
});
    });

    // ── Main orders listener ──
    const allQ = query(collection(db, "Orders"), orderBy("createdAt", "desc"));
    onSnapshot(allQ, (snapshot) => {
        allOrders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
    });

    // ── Update status from card buttons ──
    async function updateStatus(docId, newStatus, btn) {
        btn.disabled    = true;
        btn.textContent = 'Updating…';
        try {
            await updateDoc(doc(db, "Orders", docId), { status: newStatus });
        } catch(e) {
            console.error(e);
            btn.disabled    = false;
            btn.textContent = 'Retry';
        }
    }
    window.updateStatus = updateStatus;

    // ── Filter tabs ──
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            activeFilter = tab.dataset.filter;
            render();
        });
    });

    // ── Search ──
    document.getElementById('searchInput').addEventListener('input', e => {
        searchTerm = e.target.value.toLowerCase();
        render();
    });

    // ── Render ──
    function render() {
        const grid = document.getElementById('ordersGrid');

        const counts = { Pending: 0, Preparing: 0, Ready: 0 };
        allOrders.forEach(o => { if (counts[o.status] !== undefined) counts[o.status]++; });
        document.getElementById('count-all').textContent       = allOrders.length;
        document.getElementById('count-pending').textContent   = counts.Pending;
        document.getElementById('count-preparing').textContent = counts.Preparing;
        document.getElementById('count-ready').textContent     = counts.Ready;

        let filtered = allOrders;
        if (activeFilter !== 'all') filtered = filtered.filter(o => o.status === activeFilter);
        if (searchTerm) {
        filtered = filtered.filter(o => {
    const tableMatch = String(o['Table no']).includes(searchTerm);

    let items = [];

    if (Array.isArray(o.items)) {
        items = o.items;
    } else if (o.items && typeof o.items === 'object') {
        items = Object.values(o.items); // convert object → array
    }

    const itemMatch = items.some(i =>
        (i.name || '').toLowerCase().includes(searchTerm)
    );

    return tableMatch || itemMatch;
});
}
        grid.innerHTML = filtered.map(order => {
            const status    = order.status || 'Pending';
            const statusCls = status.toLowerCase();
            const type      = order.orderType || 'Dine in';
            const typeCls   = type === 'Takeaway' ? 'takeaway' : 'dine-in';
            const table     = order['Table no'] ?? '—';
            const total     = order.totalAmount ?? 0;
          let items = [];

if (Array.isArray(order.items)) {
    items = order.items;
} else if (order.items && typeof order.items === 'object') {
    items = Object.values(order.items); // convert object → array
}
            const time      = order.createdAt?.toDate
                ? order.createdAt.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : '—';
const itemsHTML = (items || []).map(i =>
                `<li>${i.name} <span>×${i.qty} · Rs.${i.price * i.qty}</span></li>`
            ).join('');

            let btnHTML = '';
            if (status === 'Pending') {
                btnHTML = `<button class="update-btn to-preparing" onclick="updateStatus('${order.id}','Preparing',this)">▶ Preparing</button>`;
            } else if (status === 'Preparing') {
                btnHTML = `<button class="update-btn to-ready" onclick="updateStatus('${order.id}','Ready',this)">✓ Mark Ready</button>`;
            } else {
                btnHTML = `<button class="update-btn done" disabled>✔ Done</button>`;
            }

            return `
            <div class="order-card ${statusCls}">
                <div class="card-header">
                    <div>
                        <div class="order-id">Table ${table}</div>
                        <div class="order-time">🕐 ${time}</div>
                    </div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                        <span class="badge ${typeCls}">${type}</span>
                        <span class="status-badge ${statusCls}">${status}</span>
                    </div>
                </div>
                <ul class="items-list">${itemsHTML}</ul>
                <div class="card-footer">
                    <div class="total-price">Rs. ${total}</div>
                    ${btnHTML}
                </div>
            </div>`;
        }).join('');
    }
</script>
</body>
