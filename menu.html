<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrostLoop | Digital Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<style>
    :root {
        --pink: #FF80AB;
        --blue: #81D4FA;
        --cream: #FFFDF5;
        --text: #4A4A4A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--cream); font-family: 'Quicksand', sans-serif; }

    /* ── Header ── */
    header {
        background: white;
        padding: 20px 20px 0;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .filter-bar {
        display: flex;
        justify-content: center;
        gap: 10px;
        overflow-x: auto;
        padding: 10px 0 5px;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 25px;
        background: #f0f0f0;
        cursor: pointer;
        font-weight: 700;
        transition: 0.3s;
        white-space: nowrap;
        font-family: 'Quicksand', sans-serif;
        font-size: 0.9rem;
    }
    .filter-btn.active { background: var(--pink); color: white; }

    .search-container { padding: 10px 20px 14px; }
    .search-container input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 15px;
        border: 1.5px solid #eee;
        font-family: 'Quicksand', sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        outline: none;
        transition: border 0.2s;
    }
    .search-container input:focus { border-color: var(--blue); }

    /* ── Menu Grid ── */
    .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
    }

    /* ── Card ── */
    .card {
        background: white;
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(255, 128, 171, 0.1);
        transition: transform 0.2s, box-shadow 0.2s;
        animation: fadeIn 0.4s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 16px 32px rgba(255,128,171,0.18); }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* item image — real photo */
    .item-img {
        height: 250px;
        width: 100%;
        object-fit: cover;
        display: block;
    }
    /* fallback when no image */
    .item-img-placeholder {
        height: 160px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 3.5rem;
        background: #FFD1DC;
    }

    /* unavailable overlay */
    .card.unavailable { opacity: 0.55; pointer-events: none; }
    .unavailable-badge {
        position: absolute;
        top: 12px; right: 12px;
        background: rgba(0,0,0,0.65);
        color: white;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 20px;
    }
    .card-img-wrap { position: relative; }

    .content { padding: 16px 20px 20px; }
    .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .item-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .price { color: var(--pink); font-weight: 700; font-size: 1rem; white-space: nowrap; }
    .item-desc { color: #999; font-size: 0.82rem; margin: 6px 0 0; line-height: 1.4; }
    .item-cat-badge {
        display: inline-block;
        margin-top: 8px;
        padding: 3px 10px;
        background: #fff0f5;
        color: var(--pink);
        border-radius: 20px;
        font-size: 0.72rem;
        font-weight: 700;
    }

    .add-btn {
        width: 100%;
        margin-top: 14px;
        padding: 10px;
        border: 2px solid var(--blue);
        background: transparent;
        color: var(--blue);
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        font-family: 'Quicksand', sans-serif;
        transition: 0.2s;
        font-size: 0.9rem;
    }
    .add-btn:hover { background: var(--blue); color: white; }

    @media (max-width: 480px) {
        .menu-grid { grid-template-columns: 1fr; }
    }

    /* ── Loading / Empty State ── */
    .state-box {
        grid-column: 1 / -1;
        text-align: center;
        padding: 60px 20px;
        color: #bbb;
    }
    .state-box i { font-size: 2.8rem; display: block; margin-bottom: 12px; }
    .state-box p { font-size: 1rem; font-weight: 600; }

    /* Spinner */
    .spinner {
        width: 44px; height: 44px;
        border: 4px solid #f0f0f0;
        border-top-color: var(--pink);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Cart Toaster ── */
    #cart-toaster {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(150%);
        background: var(--blue);
        color: white;
        padding: 15px 25px;
        border-radius: 50px;
        display: flex;
        gap: 20px;
        align-items: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        transition: 0.5s cubic-bezier(.22,.68,0,1.2);
        z-index: 2000;
        cursor: pointer;
        font-weight: 700;
        font-size: 0.95rem;
    }
    #cart-toaster .view-tag {
        background: white;
        color: var(--blue);
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.85rem;
    }

    /* ── Cart Sheet ── */
    #cart-sheet {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: white;
        height: 70vh;
        transform: translateY(100%);
        transition: 0.45s cubic-bezier(.22,.68,0,1.2);
        z-index: 3000;
        border-radius: 30px 30px 0 0;
        padding: 30px;
        box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        overflow-y: auto;
    }
    .cart-sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .cart-sheet-header h2 { font-family: 'Fredoka', sans-serif; color: var(--pink); font-size: 1.5rem; }
    .cart-close-btn { border: none; background: #f0f0f0; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1rem; }

    .cart-item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .cart-item-info strong { display: block; font-size: 0.95rem; color: var(--text); }
    .cart-item-info small { color: #aaa; font-size: 0.8rem; }
    .qty-controls { display: flex; align-items: center; gap: 10px; }
    .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid #ddd; background: white; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: 0.15s; }
    .qty-btn:hover { background: #f0f0f0; }

    .cart-total-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.15rem; margin: 16px 0; color: var(--text); }
    .confirm-order-btn {
        width: 100%;
        background: var(--pink);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 15px;
        font-family: 'Quicksand', sans-serif;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: opacity 0.2s;
    }
    .confirm-order-btn:hover { opacity: 0.9; }

    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 2500; }

    /* ── Order Modal ── */
    .modal-backdrop {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.55);
        display: none;
        z-index: 4000;
        align-items: center;
        justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
        background: white;
        border-radius: 28px;
        padding: 32px;
        width: 90%;
        max-width: 420px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        animation: slideUp 0.35s cubic-bezier(.22,.68,0,1.2);
    }
    @keyframes slideUp {
        from { transform: translateY(40px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
    }

    .modal h2 { margin: 0 0 20px; font-family: 'Fredoka', sans-serif; color: var(--pink); font-size: 1.6rem; }
    .modal label { display: block; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .modal input, .modal select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 2px solid #eee;
        font-family: 'Quicksand', sans-serif;
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 18px;
        outline: none;
        transition: border 0.2s;
    }
    .modal input:focus { border-color: var(--blue); }

    .type-row { display: flex; gap: 12px; margin-bottom: 18px; }
    .type-btn {
        flex: 1;
        padding: 12px;
        border: 2px solid #eee;
        border-radius: 14px;
        background: white;
        font-family: 'Quicksand', sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: 0.2s;
    }
    .type-btn.selected { border-color: var(--pink); background: #fff0f5; color: var(--pink); }

    .place-btn {
        width: 100%;
        padding: 15px;
        background: var(--pink);
        color: white;
        border: none;
        border-radius: 15px;
        font-family: 'Quicksand', sans-serif;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: opacity 0.2s;
    }
    .place-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .place-btn:not(:disabled):hover { opacity: 0.9; }

    .modal-cancel {
        width: 100%;
        margin-top: 10px;
        padding: 12px;
        border: none;
        background: #f5f5f5;
        border-radius: 15px;
        font-family: 'Quicksand', sans-serif;
        font-weight: 700;
        cursor: pointer;
        color: #888;
    }

    /* ── Success Toast ── */
    #success-toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(150%);
        background: #4CAF50;
        color: white;
        padding: 14px 28px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 1rem;
        z-index: 9999;
        transition: transform 0.4s cubic-bezier(.22,.68,0,1.2);
        white-space: nowrap;
    }
    #success-toast.show { transform: translateX(-50%) translateY(0); }
</style>

    <span id="toaster-info">0 Items | Rs. 0</span>
    <span class="view-tag">VIEW CART</span>
</div>

<!-- Cart Sheet -->
<div id="cart-sheet">
    <div class="cart-sheet-header">
        <h2>Your Order</h2>
        <button class="cart-close-btn" onclick="toggleCart()">✕</button>
    </div>
    <div id="cart-items-list"></div>
    <hr style="border:none;border-top:1px solid #f0f0f0;margin:10px 0;">
    <div class="cart-total-row">
        <span>Total Bill:</span>
        <span id="final-price">Rs. 0</span>
    </div>
    <button class="confirm-order-btn" onclick="openOrderModal()">CONFIRM ORDER</button>
</div>

<div id="overlay" onclick="toggleCart()"></div>

<!-- Order Details Modal -->
<div class="modal-backdrop" id="order-modal">
    <div class="modal">
        <h2>🍦 Place Your Order</h2>
        <label>Table Number</label>
        <input type="number" id="table-no" placeholder="e.g. 4" min="1">
        <label>Order Type</label>
        <div class="type-row">
            <button class="type-btn selected" id="btn-dine"  onclick="selectType('Dine in')">🪑 Dine In</button>
            <button class="type-btn"           id="btn-take" onclick="selectType('Takeaway')">🥡 Takeaway</button>
        </div>
        <button class="place-btn" id="place-order-btn" onclick="placeOrder()">Send to Kitchen 🚀</button>
        <button class="modal-cancel" onclick="closeOrderModal()">Cancel</button>
    </div>
</div>

<!-- Success Toast -->
<div id="success-toast">✅ Order sent to kitchen!</div>

<!-- Menu Grid -->
<main class="menu-grid" id="menu-container">
    <div class="state-box">
        <div class="spinner"></div>
        <p>Loading menu…</p>
    </div>
</main>

<!-- Firebase module -->
<script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkrE_JqqwxfRdNE5tina5-1-hXqjVh5WE",
        authDomain: "mykitchen-7c86a.firebaseapp.com",
        projectId: "mykitchen-7c86a",
        storageBucket: "mykitchen-7c86a.firebasestorage.app",
        messagingSenderId: "829540664076",
        appId: "1:829540664076:web:425b5b7713a14108ce7f29"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    /* ── Live-sync Menu from Firestore ── */
    onSnapshot(collection(db, "Menu"), (snapshot) => {
        const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        window._menuData = items;
        buildCategoryTabs(items);
        renderMenu();
    });

    function buildCategoryTabs(items) {
        const cats = [...new Set(items.map(i => i.category || i['item Category'] || '').filter(Boolean))];
        const bar  = document.getElementById('filter-buttons');

        // keep "All" button, rebuild the rest
        bar.innerHTML = `<button class="filter-btn active" data-cat="all">All</button>` +
            cats.map(c => `<button class="filter-btn" data-cat="${c}">${c}</button>`).join('');

        bar.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                window._activecat = btn.dataset.cat;
                renderMenu();
            });
        });
    }

    /* ── Render cards ── */
    window.renderMenu = function() {
        const items      = window._menuData || [];
        const activeCat  = window._activecat || 'all';
        const search     = (document.getElementById('menuSearch').value || '').toLowerCase();
        const container  = document.getElementById('menu-container');

        let filtered = items;
        if (activeCat !== 'all') {
            filtered = filtered.filter(i => (i.category || i['item Category'] || '') === activeCat);
        }
        if (search) {
            filtered = filtered.filter(i =>
                (i['item Name'] || '').toLowerCase().includes(search) ||
                (i['Item Descrption'] || '').toLowerCase().includes(search)
            );
        }

        if (!filtered.length) {
            container.innerHTML = `<div class="state-box"><i class="fas fa-search"></i><p>No items found.</p></div>`;
            return;
        }

        container.innerHTML = filtered.map(item => {
            const name      = item['item Name']       || 'Unnamed';
            const price     = item['Item price']      || 0;
            const desc      = item['Item Descrption'] || '';
            const image     = item['image']           || '';
            const cat       = item['category']        || item['item Category'] || '';
            const available = item['isAvailable'] !== false;

            const imgHTML = image
                ? `<img class="item-img" src="${image}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                   <div class="item-img-placeholder" style="display:none;"><i class="fas fa-ice-cream"></i></div>`
                : `<div class="item-img-placeholder"><i class="fas fa-ice-cream"></i></div>`;

            const unavailableBadge = available ? '' : `<span class="unavailable-badge">Unavailable</span>`;

            const addBtnHTML = available
                ? `<button class="add-btn" onclick="addToCart('${name.replace(/'/g,"\\'")}', ${price})">+ Add to Order</button>`
                : `<button class="add-btn" disabled style="opacity:0.4;cursor:not-allowed;">Unavailable</button>`;

            return `
            <div class="card ${available ? '' : 'unavailable'}">
                <div class="card-img-wrap">
                    ${imgHTML}
                    ${unavailableBadge}
                </div>
                <div class="content">
                    <div class="card-header-row">
                        <div class="item-name">${name}</div>
                        <div class="price">Rs. ${price}</div>
                    </div>
                    ${desc ? `<div class="item-desc">${desc}</div>` : ''}
                    ${cat  ? `<span class="item-cat-badge">${cat}</span>` : ''}
                    ${addBtnHTML}
                </div>
            </div>`;
        }).join('');
    };

    /* ── Place order to Firestore ── */
    window.confirmOrder = async function(cartItems, tableNo, type) {
        const total = cartItems.reduce((acc, i) => acc + i.price * i.qty, 0);
        await addDoc(collection(db, "Orders"), {
            "Table no":    Number(tableNo),
            "orderType":   type,
            "status":      "Pending",
            "items":       cartItems,
            "totalAmount": total,
            "createdAt":   serverTimestamp()
        });
    };
</script>

<script>
    /* ── Global state ── */
    window._menuData  = [];
    window._activecat = 'all';

    let cart         = [];
    let selectedType = 'Dine in';

    /* ── Search ── */
    document.getElementById('menuSearch').addEventListener('input', () => renderMenu());

    /* ── Cart helpers ── */
    function addToCart(name, price) {
        const ex = cart.find(i => i.name === name);
        ex ? ex.qty++ : cart.push({ name, price, qty: 1 });
        updateCartUI();
    }

    function changeQty(name, delta) {
        const item = cart.find(i => i.name === name);
        if (item) { item.qty += delta; if (item.qty <= 0) cart = cart.filter(i => i.name !== name); }
        updateCartUI();
    }

    function updateCartUI() {
        const totalItems = cart.reduce((s, i) => s + i.qty, 0);
        const totalPrice = cart.reduce((s, i) => s + i.price * i.qty, 0);
        const toaster    = document.getElementById('cart-toaster');
        if (totalItems > 0) {
            toaster.style.transform = 'translateX(-50%) translateY(0)';
            document.getElementById('toaster-info').textContent = `${totalItems} Items | Rs. ${totalPrice}`;
        } else {
            toaster.style.transform = 'translateX(-50%) translateY(150%)';
            closeCartSheet();
        }
        renderCartItems();
    }

    function renderCartItems() {
        const list  = document.getElementById('cart-items-list');
        const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
        list.innerHTML = cart.map(item => `
            <div class="cart-item-row">
                <div class="cart-item-info">
                    <strong>${item.name}</strong>
                    <small>Rs. ${item.price} × ${item.qty} = Rs. ${item.price * item.qty}</small>
                </div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="changeQty('${item.name.replace(/'/g,"\\'")}', -1)">−</button>
                    <span>${item.qty}</span>
                    <button class="qty-btn" onclick="changeQty('${item.name.replace(/'/g,"\\'")}', 1)">+</button>
                </div>
            </div>`).join('');
        document.getElementById('final-price').textContent = `Rs. ${total}`;
    }

    /* ── Cart sheet ── */
    function toggleCart() {
        const sheet   = document.getElementById('cart-sheet');
        const overlay = document.getElementById('overlay');
        const isOpen  = sheet.style.transform === 'translateY(0%)';
        sheet.style.transform = isOpen ? 'translateY(100%)' : 'translateY(0%)';
        overlay.style.display = isOpen ? 'none' : 'block';
    }
    function closeCartSheet() {
        document.getElementById('cart-sheet').style.transform = 'translateY(100%)';
        document.getElementById('overlay').style.display      = 'none';
    }
    document.getElementById('cart-toaster').addEventListener('click', toggleCart);

    /* ── Order modal ── */
    function openOrderModal() {
        if (!cart.length) return;
        closeCartSheet();
        document.getElementById('order-modal').classList.add('open');
    }
    function closeOrderModal() {
        document.getElementById('order-modal').classList.remove('open');
    }
    function selectType(type) {
        selectedType = type;
        document.getElementById('btn-dine').classList.toggle('selected', type === 'Dine in');
        document.getElementById('btn-take').classList.toggle('selected', type === 'Takeaway');
    }
    async function placeOrder() {
        const tableInput = document.getElementById('table-no').value.trim();
        if (!tableInput) {
            document.getElementById('table-no').focus();
            document.getElementById('table-no').style.borderColor = 'var(--pink)';
            return;
        }
        document.getElementById('table-no').style.borderColor = '#eee';

        const btn    = document.getElementById('place-order-btn');
        btn.disabled = true;
        btn.textContent = 'Sending…';
        try {
            await window.confirmOrder(cart, tableInput, selectedType);
            cart = [];
            updateCartUI();
            closeOrderModal();
            document.getElementById('table-no').value = '';
            selectType('Dine in');
            const toast = document.getElementById('success-toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        } catch(e) {
            console.error(e);
            alert('Failed to send order. Please try again.');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Send to Kitchen 🚀';
        }
    }

    /* expose globals */
    window.addToCart       = addToCart;
    window.changeQty       = changeQty;
    window.toggleCart      = toggleCart;
    window.openOrderModal  = openOrderModal;
    window.closeOrderModal = closeOrderModal;
    window.selectType      = selectType;
    window.placeOrder      = placeOrder;
</script>
</body>
</html>
