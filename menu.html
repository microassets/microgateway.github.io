<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrostLoop | Digital Menu</title>
 
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<style>
    :root {
    --pink: #FF80AB;
    --blue: #81D4FA;
    --cream: #FFFDF5;
    --text: #4A4A4A;
}

body {
    background-color: var(--cream);
    font-family: 'Quicksand', sans-serif;
    margin: 0;
}

header {
    background: white;
    padding: 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.brand-name { font-family: 'Fredoka', sans-serif; color: var(--pink); margin-bottom: 15px; }
.brand-name span { color: var(--blue); }

.filter-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    overflow-x: auto; /* Enables swipe on mobile */
    padding-bottom: 5px;
}

/* Hide scrollbar for Chrome/Safari */
.filter-bar::-webkit-scrollbar { display: none; }

.filter-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: #f0f0f0;
    cursor: pointer;
    font-weight: 700;
    transition: 0.3s;
    white-space: nowrap;
}

.filter-btn.active {
    background: var(--pink);
    color: white;
}

/* Responsive Grid */
.menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
}

/* Card Styling */
.card {
    background: white;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(255, 128, 171, 0.1);
}

.animate-in {
    animation: fadeIn 0.4s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.item-img {
    height: 150px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 3.5rem;
    color: white;
}

.content { padding: 20px; }
.header { display: flex; justify-content: space-between; align-items: center; }
.price { color: var(--pink); font-weight: 700; }

.add-btn {
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    border: 2px solid var(--blue);
    background: transparent;
    color: var(--blue);
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
}

.add-btn:hover { background: var(--blue); color: white; }

/* Mobile View Adjustments */
@media (max-width: 480px) {
    .menu-grid { grid-template-columns: 1fr; } /* Force single column on tiny phones */
    .brand-name { font-size: 1.5rem; }
}
</style>

<script>
    const menuData = [
    { name: "Velvet Vanilla", price: 250, cat: "Scoops", icon: "fa-ice-cream", color: "#FFD1DC" },
    { name: "Cotton Sky", price: 300, cat: "Scoops", icon: "fa-snowflake", color: "#B3E5FC" },
    { name: "Minty Loop", price: 280, cat: "Scoops", icon: "fa-leaf", color: "#C8E6C9" },
    { name: "Caramel Crunch", price: 350, cat: "Sundae", icon: "fa-cookie", color: "#FFE0B2" },
    { name: "Berry Blast", price: 320, cat: "Sundae", icon: "fa-stroopwafel", color: "#F8BBD0" },
    { name: "Galaxy Grape", price: 290, cat: "Scoops", icon: "fa-cloud-moon", color: "#D1C4E9" },
    { name: "Zesty Lemon", price: 240, cat: "Scoops", icon: "fa-lemon", color: "#FFF9C4" },
    { name: "Mocha Swirl", price: 380, cat: "Shakes", icon: "fa-mug-hot", color: "#FFCCBC" },
    { name: "Bubblegum Pop", price: 310, cat: "Shakes", icon: "fa-candy-cane", color: "#E1F5FE" },
    { name: "Pistachio Dream", price: 450, cat: "Sundae", icon: "fa-apple-alt", color: "#DCEDC8" }
];

const container = document.getElementById('menu-container');
const buttons = document.querySelectorAll('.filter-btn');

// Function to display items
function displayMenu(category) {
    container.innerHTML = "";
    
    menuData.forEach(item => {
        if (category === "all" || item.cat === category) {
            const card = `
                <div class="card animate-in">
                    <div class="item-img" style="background: ${item.color};">
                        <i class="fas ${item.icon}"></i>
                    </div>
                    <div class="content">
                        <div class="header">
                            <h3>${item.name}</h3>
                            <span class="price">Rs. ${item.price}</span>
                        </div>
                        <p>Premium ${item.cat} made with fresh local ingredients.</p>
                        <button class="add-btn">Add to Order</button>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        }
    });
}

// Filter Logic
buttons.forEach(btn => {
    btn.addEventListener('click', () => {
        // Remove active class from others
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Render filtered items
        displayMenu(btn.getAttribute('data-name'));
    });
});

// Initial Load
displayMenu('all');
</script>
