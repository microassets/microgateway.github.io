    <style>
        /* Custom Variables based on your Logo */
        :root {
            --charcoal: #3a3b49;
            --orange: #ff6b00;
            --white: #ffffff;
            --bg-gradient: linear-gradient(135deg, #1a1a1d 0%, #2d2e36 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            width: 220px;
            margin-bottom: 20px;
        }

        h3 {
            /* font-size: 1.5rem; */
            /* margin-bottom: 8px; */
            color: var(--orange);
        }

        p {
            font-size: 0.9rem;
            color: #b0b0b0;
            margin-bottom: 30px;
        }

        /* Link Card Styling */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .link-card i {
            font-size: 1.2rem;
        }

        /* Hover Effects */
        .link-card:hover {
            background: var(--orange);
            color: var(--white);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
        }

        .whatsapp:hover {
            background-color: #25D366;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .instagram:hover {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }
        .Youtube:hover{
            background: red;
        }

        .facebook:hover {
            background-color: #1877F2;
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
